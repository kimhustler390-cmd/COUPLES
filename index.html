<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couples Compatibility Quiz</title>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{max-width:460px;margin:0 auto;padding:1.5rem 1rem;font-family:var(--font-sans)}
.scr{animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.centered{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 0;text-align:center}
.logo{font-size:34px;text-align:center;margin-bottom:.4rem}
.title{font-family:var(--font-serif);font-size:24px;font-weight:500;text-align:center;color:var(--color-text-primary);margin-bottom:.25rem}
.sub{font-size:13px;color:var(--color-text-secondary);text-align:center;margin-bottom:1.5rem}
.card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:.75rem}
.card-hd{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:.9rem}
lbl{display:block;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary);margin-bottom:5px;margin-top:10px}
lbl:first-child{margin-top:0}
input[type=text]{width:100%;padding:10px 14px;font-size:15px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
input[type=text]:focus{border-color:#c0556a}
.code-inp{font-family:var(--font-mono);font-size:20px;letter-spacing:.12em;text-transform:uppercase}
.btn{display:block;width:100%;padding:12px;font-size:14px;font-weight:500;border-radius:var(--border-radius-lg);cursor:pointer;transition:opacity .15s,transform .1s;margin-top:10px;text-align:center;border:none}
.btn:active{transform:scale(.98)}
.bp{background:#c0556a;color:#fff}.bp:hover{opacity:.88}
.bo{background:transparent;color:#c0556a;border:1.5px solid #c0556a;padding:11px}.bo:hover{background:#fce8ec}
.btn-sm{padding:8px 16px;font-size:12px;width:auto;display:inline-block;margin-top:0;border-radius:var(--border-radius-md)}
.or-row{display:flex;align-items:center;gap:10px;color:var(--color-text-tertiary);font-size:12px;margin:.25rem 0}
.or-row::before,.or-row::after{content:"";flex:1;height:.5px;background:var(--color-border-tertiary)}
.code-box{font-family:var(--font-mono);font-size:44px;font-weight:500;letter-spacing:.2em;text-align:center;padding:1.25rem;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);margin:1rem 0;color:var(--color-text-primary)}
.info-c{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:11px 14px;font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem}
.info-c strong{display:block;font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
.dots-wrap{text-align:center;padding:1.25rem 0}
.dots span{display:inline-block;width:8px;height:8px;border-radius:50%;background:#c0556a;margin:0 3px;animation:bob 1.2s infinite ease-in-out}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bob{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
.wait-t{font-size:13px;color:var(--color-text-secondary);margin-top:8px}
.prog{height:4px;background:var(--color-background-secondary);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.prog-fill{height:100%;background:#c0556a;border-radius:2px;transition:width .4s}
.qb{margin-bottom:1.5rem}
.q-meta{font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px}
.q-text{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt{padding:10px 12px;font-size:13px;text-align:left;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;transition:all .15s;line-height:1.3;width:100%}
.opt:hover{border-color:#c0556a;background:#fce8ec}
.opt.sel{border-color:#c0556a;background:#fce8ec;color:#8a2a3a;font-weight:500}
.err{color:#c62828;font-size:12px;text-align:center;min-height:18px;margin:6px 0}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:1rem 0}
.sc{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;text-align:center}
.sc-n{font-family:var(--font-serif);font-size:44px;font-weight:500;line-height:1;margin-bottom:4px}
.sc-l{font-size:11px;color:var(--color-text-secondary)}
.sc-nm{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px}
.verd{text-align:center;padding:1.25rem;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);margin-bottom:1.25rem}
.v-e{font-size:28px;margin-bottom:6px}
.v-t{font-family:var(--font-serif);font-size:20px;color:var(--color-text-primary);margin-bottom:4px}
.v-s{font-size:13px;color:var(--color-text-secondary)}
.q-row{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:11px 12px;margin-bottom:8px}
.q-rt{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:7px}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.pa{background:#fce8ec;color:#8a2a3a}
.pc{background:#e8f5e9;color:#1b5e20}
.pw{background:#ffebee;color:#b71c1c}
.div{height:.5px;background:var(--color-border-tertiary);margin:1.25rem 0}
.sec{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-secondary);margin-bottom:.75rem}
.copy-row{display:flex;gap:8px;align-items:center;margin-bottom:.5rem}
.copy-row .code-box{margin:0;flex:1;font-size:28px;padding:.75rem}
.copied{font-size:11px;color:#2e7d32;font-weight:500}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const Q=[
  {q:"Ideal date night?",opts:["Cozy dinner at home","Fancy restaurant","Outdoor adventure","Movie or game night"]},
  {q:"Your love language?",opts:["Words of affirmation","Quality time","Physical touch","Acts of service"]},
  {q:"When upset, you prefer...",opts:["Space to cool down","Talking it out","A long hug","Distraction — watch something"]},
  {q:"Dream vacation?",opts:["Beach & island","City exploration","Nature & camping","Cultural / historical"]},
  {q:"You are more of a...",opts:["Morning person","Night owl","Somewhere in between","Depends on the day"]},
  {q:"Weekends are for...",opts:["Staying in & relaxing","Going out & socialising","Adventures & exploring","A mix of everything"]},
  {q:"Perfect gift from a partner?",opts:["Thoughtful handmade","An experience","Something practical","Total surprise!"]},
  {q:"Your relationship style?",opts:["Always together","Independent + quality time","Spontaneous","Routine & stable"]}
];

let S={screen:'welcome',role:null,code:null,myName:'',partnerName:'',myAnswers:{},myGuesses:{},pollTimer:null};

async function gR(c){try{const r=await window.storage.get('room:'+c,true);return r?JSON.parse(r.value):null;}catch{return null;}}
async function sR(c,d){try{await window.storage.set('room:'+c,JSON.stringify(d),true);}catch(e){console.error(e);}}

function stopP(){if(S.pollTimer){clearInterval(S.pollTimer);S.pollTimer=null;}}
function startP(fn){stopP();S.pollTimer=setInterval(fn,2500);}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');}
function showErr(m){const el=document.getElementById('err');if(el){el.textContent=m;setTimeout(()=>{if(el)el.textContent='';},3500);}}

async function createRoom(){
  const name=(document.getElementById('n1')?.value||'').trim();
  if(!name)return showErr('Please enter your name first');
  S.myName=name;S.role='a';S.code=genCode();
  await sR(S.code,{code:S.code,ts:Date.now(),a:{name,answers:{},guesses:{},selfDone:false,guessDone:false},b:null});
  S.screen='waiting_partner';render();
  startP(async()=>{const rm=await gR(S.code);if(rm?.b){stopP();S.partnerName=rm.b.name;S.screen='answering_self';render();}});
}

async function joinRoom(){
  const name=(document.getElementById('n2')?.value||'').trim();
  const code=(document.getElementById('c2')?.value||'').trim().toUpperCase();
  if(!name)return showErr('Please enter your name');
  if(!code||code.length<4)return showErr('Please enter the room code');
  const rm=await gR(code);
  if(!rm)return showErr('Room not found. Check the code and try again!');
  if(rm.b)return showErr('This room is already full!');
  S.myName=name;S.partnerName=rm.a.name;S.role='b';S.code=code;
  rm.b={name,answers:{},guesses:{},selfDone:false,guessDone:false};
  await sR(code,rm);
  S.screen='answering_self';render();
}

function pick(qi,oi){
  if(S.screen==='answering_self')S.myAnswers[qi]=oi;
  else if(S.screen==='guessing')S.myGuesses[qi]=oi;
  document.querySelectorAll(`.qb[data-q="${qi}"] .opt`).forEach(b=>b.classList.remove('sel'));
  document.querySelector(`.qb[data-q="${qi}"] [data-o="${oi}"]`)?.classList.add('sel');
}

async function submitSelf(){
  if(Object.keys(S.myAnswers).length<Q.length)return showErr('Please answer all '+Q.length+' questions!');
  const rm=await gR(S.code);if(!rm)return showErr('Connection error. Try again.');
  rm[S.role].answers=S.myAnswers;rm[S.role].selfDone=true;
  await sR(S.code,rm);
  const other=S.role==='a'?rm.b:rm.a;
  if(other&&other.selfDone){stopP();S.screen='guessing';render();}
  else{S.screen='waiting_self';render();startP(async()=>{const r=await gR(S.code);const o=S.role==='a'?r?.b:r?.a;if(o&&o.selfDone){stopP();S.screen='guessing';render();}});}
}

async function submitGuess(){
  if(Object.keys(S.myGuesses).length<Q.length)return showErr('Please answer all '+Q.length+' questions!');
  const rm=await gR(S.code);if(!rm)return showErr('Connection error. Try again.');
  rm[S.role].guesses=S.myGuesses;rm[S.role].guessDone=true;
  await sR(S.code,rm);
  const other=S.role==='a'?rm.b:rm.a;
  if(other&&other.guessDone){stopP();S.screen='results';render();}
  else{S.screen='waiting_guess';render();startP(async()=>{const r=await gR(S.code);const o=S.role==='a'?r?.b:r?.a;if(o&&o.guessDone){stopP();S.screen='results';render();}});}
}

function copyCode(){
  navigator.clipboard?.writeText(S.code).catch(()=>{});
  const el=document.getElementById('copy-hint');if(el){el.textContent='Copied!';setTimeout(()=>{if(el)el.textContent='';},2000);}
}

function buildQs(qs,saved){
  return qs.map((q,i)=>`<div class="qb" data-q="${i}">
    <div class="q-meta">Question ${i+1} of ${Q.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="opts">${q.opts.map((o,j)=>`<button class="opt${saved[i]===j?' sel':''}" data-o="${j}" onclick="pick(${i},${j})">${o}</button>`).join('')}</div>
  </div>`).join('');
}

async function render(){
  const app=document.getElementById('app');
  const pn=S.partnerName||'your partner';

  if(S.screen==='welcome'){
    app.innerHTML=`<div class="scr">
      <div class="logo">♥</div>
      <h1 class="title">Do You Really Know Me?</h1>
      <p class="sub">Real-time couples quiz — each plays on their own phone</p>
      <div class="card">
        <div class="card-hd">Create a new room</div>
        <lbl>Your name</lbl>
        <input type="text" id="n1" placeholder="e.g. Amara" maxlength="20"/>
        <button class="btn bp" onclick="createRoom()">Create room & get a code ➜</button>
      </div>
      <div class="or-row"><span>or join with a code</span></div>
      <div class="card">
        <div class="card-hd">Join a room</div>
        <lbl>Your name</lbl>
        <input type="text" id="n2" placeholder="e.g. Kevin" maxlength="20" style="margin-bottom:10px"/>
        <lbl>Room code</lbl>
        <input type="text" id="c2" class="code-inp" placeholder="ABC123" maxlength="6"/>
        <button class="btn bo" onclick="joinRoom()">Join room ➜</button>
      </div>
      <div id="err" class="err"></div>
    </div>`;}

  else if(S.screen==='waiting_partner'){
    app.innerHTML=`<div class="scr">
      <div class="logo">♥</div>
      <h1 class="title">Share this code!</h1>
      <p class="sub">Send it to your partner — they enter it to join</p>
      <div class="copy-row">
        <div class="code-box" style="flex:1">${S.code}</div>
        <button class="btn bo btn-sm" onclick="copyCode()">Copy</button>
      </div>
      <span id="copy-hint" class="copied"></span>
      <div class="info-c">Screenshot this screen, send via WhatsApp, or just read it out loud!</div>
      <div class="dots-wrap"><div class="dots"><span></span><span></span><span></span></div><p class="wait-t">Waiting for your partner to join...</p></div>
    </div>`;}

  else if(S.screen==='answering_self'){
    app.innerHTML=`<div class="scr">
      <div class="info-c"><strong>Hey ${S.myName}!</strong>Answer honestly about yourself — your partner won't see this yet.</div>
      <div class="prog"><div class="prog-fill" style="width:33%"></div></div>
      ${buildQs(Q,S.myAnswers)}
      <div id="err" class="err"></div>
      <button class="btn bp" onclick="submitSelf()">Lock in my answers ➜</button>
    </div>`;}

  else if(S.screen==='waiting_self'){
    app.innerHTML=`<div class="scr"><div class="centered">
      <div style="font-size:40px;margin-bottom:1rem">✓</div>
      <h2 class="title" style="margin-bottom:.5rem">Answers saved!</h2>
      <p class="sub">Waiting for ${pn} to finish answering...</p>
      <div class="dots-wrap"><div class="dots"><span></span><span></span><span></span></div></div>
    </div></div>`;}

  else if(S.screen==='guessing'){
    const gQs=Q.map(q=>({...q,q:`What did ${pn} answer: "${q.q}"`}));
    app.innerHTML=`<div class="scr">
      <div class="info-c"><strong>Guess time, ${S.myName}!</strong>What do you think ${pn} answered?</div>
      <div class="prog"><div class="prog-fill" style="width:66%"></div></div>
      ${buildQs(gQs,S.myGuesses)}
      <div id="err" class="err"></div>
      <button class="btn bp" onclick="submitGuess()">Submit my guesses ➜</button>
    </div>`;}

  else if(S.screen==='waiting_guess'){
    app.innerHTML=`<div class="scr"><div class="centered">
      <div style="font-size:40px;margin-bottom:1rem">♥</div>
      <h2 class="title" style="margin-bottom:.5rem">Guesses locked in!</h2>
      <p class="sub">Waiting for ${pn} to finish guessing...</p>
      <div class="dots-wrap"><div class="dots"><span></span><span></span><span></span></div></div>
    </div></div>`;}

  else if(S.screen==='results'){
    app.innerHTML=`<div class="scr"><div class="dots-wrap"><div class="dots"><span></span><span></span><span></span></div></div></div>`;
    const rm=await gR(S.code);
    if(!rm?.b){app.innerHTML=`<div class="scr"><p class="sub" style="text-align:center;padding:2rem">Error loading results.</p></div>`;return;}
    const a=rm.a,b=rm.b;
    let sA=0,sB=0;
    Q.forEach((_,i)=>{if(parseInt(a.guesses[i])===parseInt(b.answers[i]))sA++;if(parseInt(b.guesses[i])===parseInt(a.answers[i]))sB++;});
    const pA=Math.round(sA/Q.length*100),pB=Math.round(sB/Q.length*100),avg=Math.round((pA+pB)/2);
    let em,vt,vs;
    if(avg>=90){em='♥♥♥';vt='Soulmates!';vs='You are deeply in sync — absolutely wow.';}
    else if(avg>=75){em='♥♥';vt='You really know each other!';vs='A strong connection — keep nurturing it!';}
    else if(avg>=50){em='♥';vt='Pretty good!';vs="You know a lot, but there's always more to discover.";}
    else if(avg>=30){em='♡';vt='Room to grow!';vs='More quality time = better scores — book that date!';}
    else{em='✦';vt='Just getting started!';vs='A beautiful journey of discovery lies ahead.';}
    const rows=(an,bn,go,ao)=>Q.map((q,i)=>{
      const ac=parseInt(ao[i]),gu=parseInt(go[i]),ok=gu===ac;
      return `<div class="q-row"><div class="q-rt">${q.q}</div><div class="pills"><span class="pill pa">${bn}: ${Q[i].opts[ac]}</span><span class="pill ${ok?'pc':'pw'}">${ok?'✓ Correct':'✗ '+Q[i].opts[gu]}</span></div></div>`;
    }).join('');
    app.innerHTML=`<div class="scr">
      <div style="text-align:center;margin-bottom:1.25rem"><div style="font-size:28px;margin-bottom:6px">♥</div><h1 class="title">Results</h1><p class="sub">${a.name} & ${b.name}</p></div>
      <div class="verd"><div class="v-e">${em}</div><div class="v-t">${vt}</div><div class="v-s">${vs}</div></div>
      <div class="score-grid">
        <div class="sc"><div class="sc-nm">${a.name} knows ${b.name}</div><div class="sc-n" style="color:#c0556a">${pA}%</div><div class="sc-l">${sA}/${Q.length} correct</div></div>
        <div class="sc"><div class="sc-nm">${b.name} knows ${a.name}</div><div class="sc-n" style="color:#1a4a8a">${pB}%</div><div class="sc-l">${sB}/${Q.length} correct</div></div>
      </div>
      <div class="div"></div>
      <div class="sec">${a.name}'s guesses about ${b.name}</div>
      ${rows(a.name,b.name,a.guesses,b.answers)}
      <div class="div"></div>
      <div class="sec">${b.name}'s guesses about ${a.name}</div>
      ${rows(b.name,a.name,b.guesses,a.answers)}
      <button class="btn bo" style="margin-top:1.5rem" onclick="restart()">Play again ↺</button>
    </div>`;}
}

function restart(){stopP();S={screen:'welcome',role:null,code:null,myName:'',partnerName:'',myAnswers:{},myGuesses:{},pollTimer:null};render();}

render();
</script>
</body>
</html>
