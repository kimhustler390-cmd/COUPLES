<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Do You Really Know Me? ♥</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--rose:#c0556a;--rose-l:#fce8ec;--rose-d:#8a2a3a;--blue:#2a5db0;--blue-l:#e8f0fe;--green:#2e7d32;--green-l:#e8f5e9;--red:#c62828;--red-l:#ffebee;--bg:#fdf8f6;--card:#fff;--border:#e8e0dc;--txt:#1a1007;--txt2:#6b5a52;--txt3:#a89089;--serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif}
  body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem 3rem}
  .app{width:100%;max-width:440px}
  .scr{animation:fi .35s ease}
  @keyframes fi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .logo{text-align:center;font-size:38px;margin-bottom:.35rem;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  h1{font-family:var(--serif);font-size:26px;text-align:center;margin-bottom:.3rem;color:var(--txt);line-height:1.2}
  .sub{font-size:13px;color:var(--txt2);text-align:center;margin-bottom:1.75rem}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:.75rem}
  .card-hd{font-size:13px;font-weight:500;color:var(--txt);margin-bottom:.9rem;display:flex;align-items:center;gap:7px}
  .badge{background:var(--rose-l);color:var(--rose-d);font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
  .badge-b{background:var(--blue-l);color:var(--blue);font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
  label{display:block;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);margin-bottom:5px;margin-top:12px}
  label:first-of-type{margin-top:0}
  input[type=text]{width:100%;padding:11px 14px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--txt);outline:none;font-family:var(--sans);transition:border-color .15s}
  input[type=text]:focus{border-color:var(--rose)}
  .code-inp{font-family:monospace;font-size:22px;letter-spacing:.15em;text-transform:uppercase;text-align:center}
  .btn{display:block;width:100%;padding:13px;font-size:14px;font-weight:500;border-radius:12px;cursor:pointer;transition:opacity .15s,transform .1s;margin-top:12px;text-align:center;border:none;font-family:var(--sans)}
  .btn:active{transform:scale(.97)}
  .bp{background:var(--rose);color:#fff}.bp:hover{opacity:.88}
  .bo{background:transparent;color:var(--rose);border:1.5px solid var(--rose)}.bo:hover{background:var(--rose-l)}
  .btn-sm{width:auto;padding:9px 18px;font-size:13px;margin-top:0;border-radius:10px;display:inline-block}
  .or-row{display:flex;align-items:center;gap:10px;color:var(--txt3);font-size:12px;margin:.5rem 0}
  .or-row::before,.or-row::after{content:"";flex:1;height:1px;background:var(--border)}
  .code-display{font-family:monospace;font-size:48px;font-weight:700;letter-spacing:.18em;text-align:center;padding:1.25rem;background:var(--rose-l);border-radius:14px;color:var(--rose-d);margin:1rem 0;border:1px dashed var(--rose)}
  .info-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:11px 14px;font-size:13px;color:var(--txt2);margin-bottom:1rem;line-height:1.5}
  .info-box strong{display:block;font-size:14px;font-weight:500;color:var(--txt);margin-bottom:3px}
  .copy-row{display:flex;gap:8px;align-items:center;margin:1rem 0 .25rem}
  .copy-row .code-display{margin:0;flex:1;font-size:28px;padding:.85rem}
  .copy-hint{font-size:11px;color:var(--green);font-weight:500;display:block;height:16px;text-align:center}
  .dots-wrap{text-align:center;padding:2rem 0}
  .dots span{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--rose);margin:0 3px;animation:bob 1.2s infinite ease-in-out}
  .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
  @keyframes bob{0%,80%,100%{transform:scale(.4);opacity:.25}40%{transform:scale(1);opacity:1}}
  .wait-txt{font-size:13px;color:var(--txt2);margin-top:10px}
  .prog{height:5px;background:var(--border);border-radius:3px;margin-bottom:1.5rem;overflow:hidden}
  .prog-f{height:100%;background:var(--rose);border-radius:3px;transition:width .4s ease}
  .phase-tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;margin-bottom:1rem}
  .pt-rose{background:var(--rose-l);color:var(--rose-d)}
  .pt-blue{background:var(--blue-l);color:var(--blue)}
  .qb{margin-bottom:1.5rem}
  .q-meta{font-size:11px;color:var(--txt3);margin-bottom:4px}
  .q-text{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:10px;line-height:1.45}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .opt{padding:11px 12px;font-size:13px;text-align:left;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--txt);cursor:pointer;transition:all .15s;line-height:1.35;width:100%;font-family:var(--sans)}
  .opt:hover{border-color:var(--rose);background:var(--rose-l)}
  .opt.sel{border-color:var(--rose);background:var(--rose-l);color:var(--rose-d);font-weight:500}
  .err{color:var(--red);font-size:12px;text-align:center;min-height:18px;margin:6px 0;font-weight:500}
  .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:1rem 0 1.5rem}
  .sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;text-align:center}
  .sc-n{font-family:var(--serif);font-size:46px;line-height:1;margin-bottom:4px}
  .sc-nm{font-size:12px;font-weight:500;color:var(--txt2);margin-bottom:6px;line-height:1.3}
  .sc-l{font-size:11px;color:var(--txt3)}
  .verd{text-align:center;padding:1.35rem;background:var(--rose-l);border-radius:16px;margin-bottom:1.25rem;border:1px solid #f0c0c8}
  .v-e{font-size:30px;margin-bottom:6px}
  .v-t{font-family:var(--serif);font-size:22px;color:var(--rose-d);margin-bottom:5px}
  .v-s{font-size:13px;color:var(--rose-d);opacity:.8}
  .div{height:1px;background:var(--border);margin:1.25rem 0}
  .sec{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--txt2);margin-bottom:.75rem}
  .q-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px}
  .q-rt{font-size:12px;font-weight:500;color:var(--txt);margin-bottom:7px}
  .pills{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
  .pa{background:var(--rose-l);color:var(--rose-d)}
  .pc{background:var(--green-l);color:var(--green)}
  .pw{background:var(--red-l);color:var(--red)}
  .big-check{text-align:center;font-size:50px;margin-bottom:1rem;padding-top:1.5rem}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const Q=[
  {q:"Ideal date night?",opts:["Cozy dinner at home","Fancy restaurant","Outdoor adventure","Movie or game night"]},
  {q:"Your love language?",opts:["Words of affirmation","Quality time","Physical touch","Acts of service"]},
  {q:"When upset, you prefer...",opts:["Space to cool down","Talking it out","A long hug","Distraction — watch something"]},
  {q:"Dream vacation?",opts:["Beach & island","City exploration","Nature & camping","Cultural & historical"]},
  {q:"You are more of a...",opts:["Morning person","Night owl","Somewhere in between","Depends on the day"]},
  {q:"Weekends are for...",opts:["Staying in & relaxing","Going out & socialising","Adventures & exploring","A mix of everything"]},
  {q:"Perfect gift from a partner?",opts:["Thoughtful handmade","An experience","Something practical","Total surprise!"]},
  {q:"Your relationship style?",opts:["Always together","Independent + quality time","Spontaneous","Routine & stable"]}
];

let S={screen:'welcome',role:null,code:null,myName:'',partnerName:'',myAnswers:{},myGuesses:{},pollTimer:null};

/* ── Storage helpers ── */
async function gR(c){
  try{
    const r=await window.storage.get('cq:'+c,true);
    return r?JSON.parse(r.value):null;
  }catch(e){return null;}
}
async function sR(c,d){
  try{await window.storage.set('cq:'+c,JSON.stringify(d),true);}
  catch(e){console.error('storage set error',e);}
}

function stopP(){if(S.pollTimer){clearInterval(S.pollTimer);S.pollTimer=null;}}
function startP(fn){stopP();fn();S.pollTimer=setInterval(fn,3000);}
function genCode(){
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>ch[Math.floor(Math.random()*ch.length)]).join('');
}
function showErr(m){
  const el=document.getElementById('err');
  if(el){el.textContent=m;setTimeout(()=>{if(el)el.textContent='';},4000);}
}

/* ── Actions ── */
async function createRoom(){
  const name=(document.getElementById('n1')?.value||'').trim();
  if(!name)return showErr('Please enter your name first');
  S.myName=name;S.role='a';S.code=genCode();
  const room={code:S.code,ts:Date.now(),
    a:{name,answers:{},guesses:{},selfDone:false,guessDone:false},
    b:null
  };
  await sR(S.code,room);
  S.screen='waiting_partner';render();
  startP(async()=>{
    const rm=await gR(S.code);
    if(rm?.b){stopP();S.partnerName=rm.b.name;S.screen='answering_self';render();}
  });
}

async function joinRoom(){
  const name=(document.getElementById('n2')?.value||'').trim();
  const code=(document.getElementById('c2')?.value||'').trim().toUpperCase();
  if(!name)return showErr('Enter your name');
  if(code.length<4)return showErr('Enter the 6-letter room code');
  const rm=await gR(code);
  if(!rm)return showErr('Room not found — double-check the code!');
  if(rm.b)return showErr('Room is already full — ask your partner to start a new game.');
  S.myName=name;S.partnerName=rm.a.name;S.role='b';S.code=code;
  rm.b={name,answers:{},guesses:{},selfDone:false,guessDone:false};
  await sR(code,rm);
  S.screen='answering_self';render();
}

function pick(qi,oi){
  if(S.screen==='answering_self')S.myAnswers[qi]=oi;
  else if(S.screen==='guessing')S.myGuesses[qi]=oi;
  document.querySelectorAll(`.qb[data-q="${qi}"] .opt`).forEach(b=>b.classList.remove('sel'));
  document.querySelector(`.qb[data-q="${qi}"] [data-o="${oi}"]`)?.classList.add('sel');
}

async function submitSelf(){
  if(Object.keys(S.myAnswers).length<Q.length)return showErr('Please answer all '+Q.length+' questions!');
  const rm=await gR(S.code);
  if(!rm)return showErr('Connection error — try again.');
  rm[S.role].answers=S.myAnswers;rm[S.role].selfDone=true;
  await sR(S.code,rm);
  const other=S.role==='a'?rm.b:rm.a;
  if(other?.selfDone){stopP();S.screen='guessing';render();}
  else{
    S.screen='waiting_self';render();
    startP(async()=>{
      const r=await gR(S.code);
      const o=S.role==='a'?r?.b:r?.a;
      if(o?.selfDone){stopP();S.screen='guessing';render();}
    });
  }
}

async function submitGuess(){
  if(Object.keys(S.myGuesses).length<Q.length)return showErr('Please answer all '+Q.length+' questions!');
  const rm=await gR(S.code);
  if(!rm)return showErr('Connection error — try again.');
  rm[S.role].guesses=S.myGuesses;rm[S.role].guessDone=true;
  await sR(S.code,rm);
  const other=S.role==='a'?rm.b:rm.a;
  if(other?.guessDone){stopP();S.screen='results';render();}
  else{
    S.screen='waiting_guess';render();
    startP(async()=>{
      const r=await gR(S.code);
      const o=S.role==='a'?r?.b:r?.a;
      if(o?.guessDone){stopP();S.screen='results';render();}
    });
  }
}

function copyCode(){
  navigator.clipboard?.writeText(S.code).catch(()=>{});
  const el=document.getElementById('copy-hint');
  if(el){el.textContent='✓ Copied to clipboard!';setTimeout(()=>{if(el)el.textContent='';},2500);}
}

/* ── Question HTML builder ── */
function buildQs(questions,saved){
  return questions.map((q,i)=>`
    <div class="qb" data-q="${i}">
      <div class="q-meta">Question ${i+1} of ${Q.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts">${q.opts.map((o,j)=>`
        <button class="opt${saved[i]===j?' sel':''}" data-o="${j}" onclick="pick(${i},${j})">${o}</button>
      `).join('')}</div>
    </div>
  `).join('');
}

/* ── Render ── */
async function render(){
  const app=document.getElementById('app');
  const pn=S.partnerName||'your partner';

  /* WELCOME */
  if(S.screen==='welcome'){
    app.innerHTML=`<div class="scr">
      <div class="logo">♥</div>
      <h1>Do You Really Know Me?</h1>
      <p class="sub">A real-time couples quiz — each plays on their own phone</p>
      <div class="card">
        <div class="card-hd"><span class="badge">NEW GAME</span> Create a room</div>
        <label>Your name</label>
        <input type="text" id="n1" placeholder="e.g. Amara" maxlength="20"/>
        <button class="btn bp" onclick="createRoom()">Create room & get code ♥</button>
      </div>
      <div class="or-row"><span>already have a code?</span></div>
      <div class="card">
        <div class="card-hd"><span class="badge-b">JOIN</span> Enter room code</div>
        <label>Your name</label>
        <input type="text" id="n2" placeholder="e.g. Kevin" maxlength="20"/>
        <label>Room code (from partner)</label>
        <input type="text" id="c2" class="code-inp" placeholder="ABC123" maxlength="6"/>
        <button class="btn bo" onclick="joinRoom()">Join room ➜</button>
      </div>
      <div id="err" class="err"></div>
    </div>`;
  }

  /* WAITING FOR PARTNER TO JOIN */
  else if(S.screen==='waiting_partner'){
    app.innerHTML=`<div class="scr">
      <div class="logo">♥</div>
      <h1>Share this code!</h1>
      <p class="sub">Send it to your partner — they enter it on their phone</p>
      <div class="copy-row">
        <div class="code-display">${S.code}</div>
        <button class="btn bo btn-sm" onclick="copyCode()">Copy</button>
      </div>
      <span id="copy-hint" class="copy-hint"></span>
      <div class="info-box">
        <strong>How to share</strong>
        Send via WhatsApp, read it out loud, or screenshot this screen.
        Your partner opens the same link and enters this code.
      </div>
      <div class="dots-wrap">
        <div class="dots"><span></span><span></span><span></span></div>
        <p class="wait-txt">Waiting for your partner to join...</p>
      </div>
    </div>`;
  }

  /* ANSWERING ABOUT YOURSELF */
  else if(S.screen==='answering_self'){
    app.innerHTML=`<div class="scr">
      <div class="phase-tag pt-rose">♥ Step 1 of 2 — About you</div>
      <div class="info-box"><strong>Hey ${S.myName}!</strong>Answer honestly about yourself. ${pn} won't see this yet.</div>
      <div class="prog"><div class="prog-f" style="width:33%"></div></div>
      ${buildQs(Q,S.myAnswers)}
      <div id="err" class="err"></div>
      <button class="btn bp" onclick="submitSelf()">Lock in my answers ➜</button>
    </div>`;
  }

  /* WAITING FOR PARTNER TO FINISH THEIR ANSWERS */
  else if(S.screen==='waiting_self'){
    app.innerHTML=`<div class="scr">
      <div class="big-check">✓</div>
      <h1>Answers saved!</h1>
      <p class="sub" style="margin-top:.5rem">Waiting for ${pn} to finish answering...</p>
      <div class="dots-wrap">
        <div class="dots"><span></span><span></span><span></span></div>
        <p class="wait-txt">This will update automatically ♥</p>
      </div>
    </div>`;
  }

  /* GUESSING PARTNER'S ANSWERS */
  else if(S.screen==='guessing'){
    const gQs=Q.map(q=>({...q,q:`What did ${pn} answer: "${q.q}"`}));
    app.innerHTML=`<div class="scr">
      <div class="phase-tag pt-blue">✦ Step 2 of 2 — Guess ${pn}'s answers</div>
      <div class="info-box"><strong>Now guess, ${S.myName}!</strong>What do you think ${pn} said about themselves?</div>
      <div class="prog"><div class="prog-f" style="width:66%"></div></div>
      ${buildQs(gQs,S.myGuesses)}
      <div id="err" class="err"></div>
      <button class="btn bp" onclick="submitGuess()">Submit my guesses ➜</button>
    </div>`;
  }

  /* WAITING FOR PARTNER TO FINISH GUESSING */
  else if(S.screen==='waiting_guess'){
    app.innerHTML=`<div class="scr">
      <div class="big-check">♥</div>
      <h1>Guesses locked in!</h1>
      <p class="sub" style="margin-top:.5rem">Waiting for ${pn} to finish guessing...</p>
      <div class="dots-wrap">
        <div class="dots"><span></span><span></span><span></span></div>
        <p class="wait-txt">Results will appear automatically ♥</p>
      </div>
    </div>`;
  }

  /* RESULTS */
  else if(S.screen==='results'){
    app.innerHTML=`<div class="scr"><div class="dots-wrap"><div class="dots"><span></span><span></span><span></span></div><p class="wait-txt">Loading results...</p></div></div>`;
    const rm=await gR(S.code);
    if(!rm?.b){
      app.innerHTML=`<div class="scr"><p class="sub" style="text-align:center;padding:2rem">Could not load results. Please refresh.</p></div>`;
      return;
    }
    const a=rm.a,b=rm.b;
    let sA=0,sB=0;
    Q.forEach((_,i)=>{
      if(Number(a.guesses[i])===Number(b.answers[i]))sA++;
      if(Number(b.guesses[i])===Number(a.answers[i]))sB++;
    });
    const pA=Math.round(sA/Q.length*100),pB=Math.round(sB/Q.length*100),avg=Math.round((pA+pB)/2);
    let em,vt,vs;
    if(avg>=90){em='♥♥♥';vt='Soulmates!';vs='You are completely in sync. Absolutely wow.';}
    else if(avg>=75){em='♥♥';vt='You really know each other!';vs='A strong connection — keep nurturing it!';}
    else if(avg>=50){em='♥';vt='Pretty good!';vs="You know a lot, but there's always more to discover.";}
    else if(avg>=30){em='♡';vt='Room to grow!';vs='More quality time = better scores. Book that date night!';}
    else{em='✦';vt='Just getting started!';vs='A beautiful journey of discovery lies ahead of you.';}

    const rows=(guesser,target,guesses,answers)=>Q.map((q,i)=>{
      const ac=Number(answers[i]),gu=Number(guesses[i]),ok=gu===ac;
      return `<div class="q-row">
        <div class="q-rt">${q.q}</div>
        <div class="pills">
          <span class="pill pa">${target}: ${Q[i].opts[ac]??'?'}</span>
          <span class="pill ${ok?'pc':'pw'}">${ok?'✓ Correct':'✗ '+( Q[i].opts[gu]??'?')}</span>
        </div>
      </div>`;
    }).join('');

    app.innerHTML=`<div class="scr">
      <div style="text-align:center;margin-bottom:1.25rem">
        <div style="font-size:30px;margin-bottom:6px">♥</div>
        <h1>Your Results</h1>
        <p class="sub">${a.name} & ${b.name}</p>
      </div>
      <div class="verd">
        <div class="v-e">${em}</div>
        <div class="v-t">${vt}</div>
        <div class="v-s">${vs}</div>
      </div>
      <div class="score-grid">
        <div class="sc">
          <div class="sc-nm">${a.name} knows ${b.name}</div>
          <div class="sc-n" style="color:var(--rose)">${pA}%</div>
          <div class="sc-l">${sA}/${Q.length} correct</div>
        </div>
        <div class="sc">
          <div class="sc-nm">${b.name} knows ${a.name}</div>
          <div class="sc-n" style="color:var(--blue)">${pB}%</div>
          <div class="sc-l">${sB}/${Q.length} correct</div>
        </div>
      </div>
      <div class="div"></div>
      <div class="sec">${a.name}'s guesses about ${b.name}</div>
      ${rows(a.name,b.name,a.guesses,b.answers)}
      <div class="div"></div>
      <div class="sec">${b.name}'s guesses about ${a.name}</div>
      ${rows(b.name,a.name,b.guesses,a.answers)}
      <button class="btn bo" style="margin-top:1.75rem" onclick="restart()">Play again ↺</button>
    </div>`;
  }
}

function restart(){
  stopP();
  S={screen:'welcome',role:null,code:null,myName:'',partnerName:'',myAnswers:{},myGuesses:{},pollTimer:null};
  render();
}

render();
</script>
</body>
</html>
